services:
  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile.prod
    ports:
      - "80:80"
    volumes:
      # ESTA LÍNEA es la clave: "mapea" tu archivo de fuera al sitio correcto dentro de Nginx
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    # Importante: Pasar todas las variables que el backend necesita para conectar con los otros servicios
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - OLLAMA_BASE_URL=http://ollama-service:11434
      - MINIO_ENDPOINT=minio-service:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    depends_on:
      - db
      - minio-service

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  ollama-service:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # Límites de hardware desde el .env
    mem_limit: ${OLLAMA_MAX_RAM}
    cpus: ${OLLAMA_MAX_CPU}
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
      - OLLAMA_HOST=${OLLAMA_HOST}

  minio-service:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  ollama_data:
  minio_data: